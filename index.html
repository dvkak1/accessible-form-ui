<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>

    <div class="form-container">
        <form action="#" method="POST">
            <div class="form-group">
               <label for="full-name">Full Name</label>
               <input type="text" id="full-name" name="full-name" placeholder="What should we call you?" aria-required="true">

               <label for="email">Email</label>
               <input type="email" id="email" name="email" placeholder="demo@gmail.com" aria-required="true" aria-invalid="true">
            </div>

            <div class="form-group password-container">
               <label for="password">Password</label>
               <input type="password" id="password" name="password" aria-required="true">
               <button type="button" class="show-password-btn" aria-label="Password is hidden" aria-pressed="false">
                 <svg stroke="#b0b0b0" width="15" height="15" viewBox="0 0 15 15" fill="none" xmins="https://www.w3.org/2000/svg">
                      <path d="M7.5 2.5C4.5 2.5 1.9 4.8 0.5 7.5C1.9 10.2 4.5 12.5 7.5 12.5C10.5 12.5 13.1 10.2 14.5 7.5C13.1 4.8 10.5 2.5 7.5 2.5ZM7.5 11C6.1 11 4.9 9.8 4.9 8.4C4.9 7 6.1 5.8 7.5 5.8C8.9 5.8 10.1 7 10.1 8.4C10.1 9.8 8.9 11 7.5 11ZM7.5 6C6.8 6 6.3 6.6 6.3 7.3C6.3 8 6.8 8.6 7.5 8.6C8.2 8.6 8.7 8,2,9,7,3,7,3,6,3Z" 
                      fill="#b0b0b0" fill-rule="evenodd" clip-rule="evenodd"/>
                 </svg>
               </button>
               <span class="error-message">Passwords must match</span>

               <label for="confirm-password">Confirm Password</label>
               <input type="password" id="confirm-password" name="confirm-password" aria-required="true">
               <button type="button" class="show-password-btn" aria-label="Password is hidden" aria-pressed="false">
                 <svg stroke="#b0b0b0" width="15" height="15" viewBox="0 0 15 15" fill="none" xmins="https://www.w3.org/2000/svg">
                   <path d="M13.35336 2.35355C13.5488 2.54808 13.5488 2.90219 13.35336 3.09671L2.35336 12.0967C2.15792 12.2913 1.80381 12.2913 1.60837 12.0967C1.41294 11.9022 1.41294 11.5481 1.60837 11.3536L12.6084 2.35355C12.8038 2.15801 13.1579 2.15801 13.3534 2.35355Z" fill="#b0b0b0"/> 
                 </svg>   
               </button>
               <span class="error-message">Passwords must match</span>
            </div>

            <div class="form-group">
                <button type="submit">Update Profile</button>
            </div>

            <div class="progress-container">
                  <div class="progress-bar">
                    <div class="progress"></div>
                  </div>
                  <span class="progress-percentage">65%</span>
            </div>

            <div class="form-footer">
                <ul class="checklist">
                    <li>Create Account</li>
                    <li>Update Roadmap Progress</li>
                    <li>Setup Public Profile</li>
                    <li>Complete your first project</li>
                    <li>Invite your friends</li>
                </ul>
            </div>
        </form>
    </div>
    
</body>
</html>
